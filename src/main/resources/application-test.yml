server:
  port: 8080

spring:
  application:
    name: exam-system

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  h2:
    console:
      enabled: true
      path: /h2-console

  redis:
    host: localhost
    port: 6379

  mail:
    host: smtp.test.com
    port: 587
    username: test@test.com
    password: test-password
    protocol: smtp

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      table-underline: true

logging:
  level:
    org.example.examsystem: debug
    org.mybatis: debug

spark:
  api:
    password: test-password